<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Netflix - Trending</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #202020;
            color: #fff;
        }
        header {
            color: #fff;
            padding: 20px;
            text-align: auto;
            display: flex;
            align-items: center;
        }
        nav {
            background-color: none;
            text-align: left;
            margin-left: 40px;
        }
        
        nav a {
            color: #F7F9F9;
            text-decoration: none;
            padding: 30px 40px;
        }
        
        nav a:hover {
            color: #FF5733; 
        }

        .logo {
            width: 100px; 
            height: auto; 
            margin-left: 80px;
        }
        main {
            padding: 20px;
        }

        h2 {
            color: #fff;
            margin-bottom: 30px;
        }
        .trending-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .show {
            width: 300px;
            height: 200px; 
            padding: 10px;
            margin: 10px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        }
        .show img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
        }
	
	.search-container {
    margin-left: auto;
    margin-right: 150px;
	}

	.search-input {
            padding: 5px 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-right: 10px;
            width: 200px;
        }
        .search-button {
            padding: 5px 10px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .search-button:hover {
            background-color: #555;
        }

    </style>
</head>
<body>
    <header>
        <img src="logo.png" alt="Logo" class="logo">
        <nav>
            <a href="index.html"">Home</a>
            <a href="trending.html">Trending</a>
            <a href="login.html">Login</a>
        </nav>

        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search...">
            <button class="search-button">Search</button>

        </div>
    </header>

    <main>
        <h2>Trending Now</h2>

        <div class="trending-container">

            <div class="show">
                <img src="st.png.webp" alt="Show 1">
            </div>

            <div class="show">
                <img src="obs.jpg" alt="Show 2">
            </div>

            <div class="show">
                <img src="tnt.jpg" alt="Show 3">
            </div>

            <div class="show">
                <img src="hapi.avif" alt="Show 4">
            </div>

            <div class="show">
                <img src="tg.jpg" alt="Show 5">
            </div>

            <div class="show">
                <img src="rb.png" alt="Show 6">
            </div>

            <div class="show">
                <img src="snow.png" alt="Show 7">
            </div>

            <div class="show">
                <img src="gd.png" alt="Show 8">
            </div>

            <div class="show">
                <img src="gbm.jpg" alt="Show 9">
            </div>

            <div class="show">
                <img src="su.jpg" alt="Show 10">
            </div>
        </div>
    </main>
</body>
</html>
